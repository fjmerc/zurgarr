services:
  zurgarr:
    container_name: zurgarr
    image: zurgarr:latest  # Build locally: docker build -t zurgarr https://github.com/fjmerc/zurgarr.git
    stdin_open: true # docker run -i
    tty: true        # docker run -t
    volumes:
      ## Location of configuration files
      - /zurgarr/config:/config
      ## Location for logs
      - /zurgarr/log:/log
      ## Location for rclone cache if enabled
      - /zurgarr/cache:/cache
      ## Location for Zurg RealDebrid active configuration
      - /zurgarr/RD:/zurg/RD
      ## Location for Zurg AllDebrid active configuration
      - /zurgarr/AD:/zurg/AD
      ## Location for rclone mount to host
      - /zurgarr/mnt:/data:shared
      ## Blackhole watch folder for .torrent/.magnet files (uncomment to enable)
      # - /zurgarr/watch:/watch
      ## Completed symlinks directory for Sonarr/Radarr import (uncomment to enable)
      # - /zurgarr/completed:/completed
    environment:
      ## ---------------------------------------------------------------
      ## All values are read from your .env file (see .env.example)
      ## You can safely pull updates without losing your configuration.
      ## To get started: cp .env.example .env && edit .env
      ## ---------------------------------------------------------------
      ## Timezone
      - TZ=${TZ:-}
      ## Zurg
      - ZURG_ENABLED=${ZURG_ENABLED:-true}
      - RD_API_KEY=${RD_API_KEY:-}
      - AD_API_KEY=${AD_API_KEY:-}
      - TORBOX_API_KEY=${TORBOX_API_KEY:-}
      - ZURG_VERSION=${ZURG_VERSION:-}
      - ZURG_UPDATE=${ZURG_UPDATE:-}
      - ZURG_LOG_LEVEL=${ZURG_LOG_LEVEL:-}
      - ZURG_PORT=${ZURG_PORT:-}
      - ZURG_USER=${ZURG_USER:-}
      - ZURG_PASS=${ZURG_PASS:-}
      ## rclone
      - RCLONE_MOUNT_NAME=${RCLONE_MOUNT_NAME:-zurgarr}
      - RCLONE_LOG_LEVEL=${RCLONE_LOG_LEVEL:-}
      - NFS_ENABLED=${NFS_ENABLED:-}
      - NFS_PORT=${NFS_PORT:-}
      - RCLONE_CACHE_DIR=${RCLONE_CACHE_DIR:-}
      - RCLONE_DIR_CACHE_TIME=${RCLONE_DIR_CACHE_TIME:-}
      - RCLONE_VFS_READ_CHUNK_SIZE=${RCLONE_VFS_READ_CHUNK_SIZE:-}
      - RCLONE_VFS_READ_CHUNK_SIZE_LIMIT=${RCLONE_VFS_READ_CHUNK_SIZE_LIMIT:-}
      - RCLONE_BUFFER_SIZE=${RCLONE_BUFFER_SIZE:-}
      - RCLONE_TRANSFERS=${RCLONE_TRANSFERS:-}
      ## plex_debrid
      - PD_ENABLED=${PD_ENABLED:-}
      - PLEX_USER=${PLEX_USER:-}
      - PLEX_TOKEN=${PLEX_TOKEN:-}
      - PLEX_ADDRESS=${PLEX_ADDRESS:-}
      - SHOW_MENU=${SHOW_MENU:-}
      - PD_UPDATE=${PD_UPDATE:-}
      - PD_LOG_LEVEL=${PD_LOG_LEVEL:-}
      - SEERR_API_KEY=${SEERR_API_KEY:-}
      - SEERR_ADDRESS=${SEERR_ADDRESS:-}
      - TRAKT_CLIENT_ID=${TRAKT_CLIENT_ID:-}
      - TRAKT_CLIENT_SECRET=${TRAKT_CLIENT_SECRET:-}
      - FLARESOLVERR_URL=${FLARESOLVERR_URL:-}
      ## Jellyfin
      - JF_ADDRESS=${JF_ADDRESS:-}
      - JF_API_KEY=${JF_API_KEY:-}
      ## Plex Library
      - PLEX_REFRESH=${PLEX_REFRESH:-}
      - PLEX_MOUNT_DIR=${PLEX_MOUNT_DIR:-}
      - DUPLICATE_CLEANUP=${DUPLICATE_CLEANUP:-}
      - CLEANUP_INTERVAL=${CLEANUP_INTERVAL:-}
      - DUPLICATE_CLEANUP_KEEP=${DUPLICATE_CLEANUP_KEEP:-}
      ## Notifications
      - NOTIFICATION_URL=${NOTIFICATION_URL:-}
      - NOTIFICATION_EVENTS=${NOTIFICATION_EVENTS:-}
      - NOTIFICATION_LEVEL=${NOTIFICATION_LEVEL:-}
      ## Blackhole
      - BLACKHOLE_ENABLED=${BLACKHOLE_ENABLED:-}
      - BLACKHOLE_DIR=${BLACKHOLE_DIR:-}
      - BLACKHOLE_POLL_INTERVAL=${BLACKHOLE_POLL_INTERVAL:-}
      - BLACKHOLE_DEBRID=${BLACKHOLE_DEBRID:-}
      ## Blackhole Symlink (creates symlinks in completed dir for Sonarr/Radarr import)
      - BLACKHOLE_SYMLINK_ENABLED=${BLACKHOLE_SYMLINK_ENABLED:-}
      - BLACKHOLE_COMPLETED_DIR=${BLACKHOLE_COMPLETED_DIR:-/completed}
      - BLACKHOLE_RCLONE_MOUNT=${BLACKHOLE_RCLONE_MOUNT:-/data}
      - BLACKHOLE_SYMLINK_TARGET_BASE=${BLACKHOLE_SYMLINK_TARGET_BASE:-}
      - BLACKHOLE_MOUNT_POLL_TIMEOUT=${BLACKHOLE_MOUNT_POLL_TIMEOUT:-300}
      - BLACKHOLE_MOUNT_POLL_INTERVAL=${BLACKHOLE_MOUNT_POLL_INTERVAL:-10}
      - BLACKHOLE_SYMLINK_MAX_AGE=${BLACKHOLE_SYMLINK_MAX_AGE:-72}
      - SYMLINK_REPAIR_AUTO_SEARCH=${SYMLINK_REPAIR_AUTO_SEARCH:-false}
      ## Status Web UI & Settings Editor
      - STATUS_UI_ENABLED=${STATUS_UI_ENABLED:-true}
      - STATUS_UI_PORT=${STATUS_UI_PORT:-8080}
      - STATUS_UI_AUTH=${STATUS_UI_AUTH:-}
      ## Library Metadata
      - TMDB_API_KEY=${TMDB_API_KEY:-}
      ## Media Services (Library Download)
      - SONARR_URL=${SONARR_URL:-}
      - SONARR_API_KEY=${SONARR_API_KEY:-}
      - RADARR_URL=${RADARR_URL:-}
      - RADARR_API_KEY=${RADARR_API_KEY:-}
      ## Library preference enforcement
      - LIBRARY_PREFERENCE_AUTO_ENFORCE=${LIBRARY_PREFERENCE_AUTO_ENFORCE:-}
      - DEBRID_UNAVAILABLE_THRESHOLD_DAYS=${DEBRID_UNAVAILABLE_THRESHOLD_DAYS:-}
      - PENDING_WARNING_HOURS=${PENDING_WARNING_HOURS:-}
      ## Monitoring
      - FFPROBE_MONITOR_ENABLED=${FFPROBE_MONITOR_ENABLED:-}
      - FFPROBE_STUCK_TIMEOUT=${FFPROBE_STUCK_TIMEOUT:-}
      - FFPROBE_POLL_INTERVAL=${FFPROBE_POLL_INTERVAL:-}
      - AUTO_UPDATE_INTERVAL=${AUTO_UPDATE_INTERVAL:-}
      ## Logging
      - ZURGARR_LOG_LEVEL=${ZURGARR_LOG_LEVEL:-}
      - ZURGARR_LOG_COUNT=${ZURGARR_LOG_COUNT:-}
      - ZURGARR_LOG_SIZE=${ZURGARR_LOG_SIZE:-}
      - COLOR_LOG_ENABLED=${COLOR_LOG_ENABLED:-}
      ## Advanced
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - SKIP_VALIDATION=${SKIP_VALIDATION:-}
    ## Status Web UI & Prometheus metrics
    ports:
      - "${STATUS_UI_PORT:-8080}:${STATUS_UI_PORT:-8080}"
    # Uncomment to route traffic through a VPN container (e.g., gluetun)
    # network_mode: container:gluetun
    devices:
      - /dev/fuse:/dev/fuse:rwm
    cap_add:
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined
      - no-new-privileges
